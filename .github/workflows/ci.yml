name: CI

# Gate every push/PR on the same `verify` harness developers run locally, plus a
# secret scan. Actions are pinned to commit SHAs (not tags) — mutable tags are a
# supply-chain risk (cf. the aquasecurity/trivy-action tag hijack, Mar 2026).

on:
  push:
    branches: [main, redesign/v2]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0 # fallow audit diffs against the merge-base — needs history
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
        with:
          fetch-depth: 0 # full history so gitleaks scans past commits too
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_ENABLE_SUMMARY: 'true'
          # gitleaks-action is free for personal repos; no GITLEAKS_LICENSE needed.
